services:
  - type: web
    name: sigadea
    env: php
    plan: free
    buildCommand: "composer install --no-dev --optimize-autoloader"
    startCommand: "php -S 0.0.0.0:$PORT -t ."
    envVars:
      - key: DB_HOST
        value: zephyr.proxy.rlwy.net
      - key: DB_PORT
        value: 11902
      - key: DB_NAME
        value: railway
      - key: DB_USER
        value: root
      - key: DB_PASS
        sync: false
