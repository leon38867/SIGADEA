services:
  - type: web
    name: sigadea
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DB_HOST
        value: zephyr.proxy.rlwy.net
      - key: DB_PORT
        value: 11902
      - key: DB_NAME
        value: railway
      - key: DB_USER
        value: root
      - key: DB_PASS
        sync: false
